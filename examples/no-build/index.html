<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spark — no build, no install</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

    <!-- Zero tooling: pull Spark straight from a CDN. No install, no bundler,
         no compiler, no build step. An import map is all you need. -->
    <script type="importmap">
      { "imports": { "spark-html": "https://esm.sh/spark-html@0.27" } }
    </script>

    <style>
      body { font-family: ui-monospace, "JetBrains Mono", monospace; max-width: 640px; margin: 64px auto; padding: 0 20px; background: #000; color: #fff; line-height: 1.6; }
      h1 { letter-spacing: -.02em; } h1 em { color: #ffd24a; font-style: normal; }
      code { color: #ffd24a; } a { color: #ffd24a; }
      .muted { color: #888; }
    </style>
  </head>
  <body>
    <h1>⚡ Spark with <em>no build step</em></h1>
    <p class="muted">
      This page imports Spark from a CDN and renders a component served as a plain
      <code>.html</code> file. No install, no bundler, no compiler — just an import map
      and <code>mount()</code>.
    </p>

    <!-- Local component, fetched as a static file -->
    <div import="components/counter"></div>

    <!-- A second component with a prop — components are just files, anywhere -->
    <div import="components/hello" who="world"></div>

    <script type="module">
      import { mount } from 'spark-html';
      mount();
    </script>
  </body>
</html>
