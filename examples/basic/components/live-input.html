<div class="card">
  <h2>Live input</h2>
  <p class="hint">Two-way feel: oninput updates state, text re-renders.</p>

  <input type="text" oninput="{update}" placeholder="Type something…" />
  <p class="echo">You typed: <strong>{text || '…nothing yet'}</strong></p>
  <p class="meta">{text.length} character{text.length === 1 ? '' : 's'}, reversed: {text.split('').reverse().join('')}</p>
</div>

<script>
  let text = '';
  function update(event) {
    text = event.target.value;
  }
</script>

<style>
  .echo { margin-top: 12px; font-size: 14px; }
  .echo strong { color: var(--spark); }
  .meta { margin-top: 4px; font-size: 12px; color: var(--muted-dim); }
</style>
