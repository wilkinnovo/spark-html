<div class="card">
  <h2>Reactive statements</h2>
  <p class="hint">$: derived values recompute whenever state changes.</p>
  <p class="readout">{count} × 2 = <strong>{doubled}</strong> · squared = <strong>{squared}</strong> · {label}</p>
  <button onclick="{inc}">count++</button>
</div>

<script>
  let count = 2;

  $: doubled = count * 2;
  $: squared = count * count;
  $: label = squared > 25 ? 'getting big!' : 'still small';

  function inc() { count++; }
</script>

<style>
  .readout { font-size: 15px; margin-bottom: 14px; font-variant-numeric: tabular-nums; }
  .readout strong { color: var(--spark); }
</style>
