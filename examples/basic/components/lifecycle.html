<div class="card">
  <h2>Lifecycle</h2>
  <p class="hint">onMount runs after first paint; its return value is a cleanup hook.</p>
  <p class="line">mounted at <strong>{mountedAt}</strong></p>
  <p class="line">alive for <strong>{alive}s</strong></p>
</div>

<script>
  let mountedAt = '…';
  let alive = 0;

  onMount(() => {
    mountedAt = new Date().toLocaleTimeString();
    const handle = setInterval(() => { alive++; }, 1000);
    return () => clearInterval(handle);
  });
</script>

<style>
  .line { font-size: 14px; margin: 4px 0; font-variant-numeric: tabular-nums; }
  .line strong { color: var(--spark); }
</style>
