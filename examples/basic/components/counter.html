<div class="card">
  <h2>Counter: {count}</h2>
  <p class="hint">Buttons mutate state, DOM re-patches automatically.</p>
  <div class="row">
    <button onclick="{decrement}">−</button>
    <button onclick="{increment}">+</button>
    <button :disabled="count === 0" class="reset" onclick="{reset}">Reset</button>
  </div>
</div>

<script>
  let count = 0;
  function increment() { count++; }
  function decrement() { count--; }
  function reset()     { count = 0; }
</script>

<style>
  h2 { margin-bottom: 6px; }
  .reset { font-size: 13px; color: var(--muted); margin-left: auto; }
</style>
