<div class="card">
  <h2>Todos ({remaining})</h2>

  <div class="input-group">
    <input type="text" bind:value="input" placeholder="Enter a new todo" />
    <button :disabled="!input.trim()" onclick="{addTodo}">Add</button>
    <button class="reset" onclick="{reset}">Reset</button>
  </div>

  <ul class="todos">
    <template each="todo, i in todos">
      <li class="todo">
        <template if="editing === i">
          <input class="edit" bind:value="editDraft"
                 onkeydown="{onEditKey}" onblur="{saveEdit}" />
        </template>
        <template if="editing !== i">
          <span class="text" onclick="{startEdit}" :data-index="i">{i + 1}. {todo}</span>
        </template>
        <button class="remove" onclick="{removeAt}" :data-index="i">✕</button>
      </li>
    </template>
  </ul>
  <p class="empty" :hidden="todos.length > 0">Nothing here. Add your first todo above.</p>
  <p class="hint">Click a todo to edit it, then press Enter or click away.</p>
</div>

<script>
  let todos = ['Buy groceries', 'Walk the dog', 'Read a book'];
  let input = '';
  let editing = -1;     // index of the todo being edited, or -1
  let editDraft = '';
  $: remaining = todos.length + (todos.length === 1 ? ' item' : ' items');

  function addTodo() {
    if (!input.trim()) return;
    todos = [...todos, input.trim()];
    input = '';
  }
  function removeAt(event) {
    const i = Number(event.target.dataset.index);
    todos = todos.filter((_, idx) => idx !== i);
  }
  function reset() {
    todos = [];
    input = '';
  }
  function startEdit(event) {
    const i = Number(event.target.dataset.index);
    editing = i;
    editDraft = todos[i];
  }
  function saveEdit() {
    if (editing < 0) return;
    const i = editing;
    const text = editDraft.trim();
    if (text) todos = todos.map((t, idx) => (idx === i ? text : t));
    editing = -1;
  }
  function onEditKey(event) {
    if (event.key === 'Enter') saveEdit();
    if (event.key === 'Escape') editing = -1;
  }
</script>

<style>
  h2 { margin-bottom: 14px; }
  .input-group { display: flex; gap: 10px; }
  .input-group input { flex: 1; }
  .reset { color: #ff6b6b; }
  .reset:hover { border-color: #ff6b6b; color: #ff6b6b; }
  .todos { list-style: none; padding: 0; margin-top: 14px; }
  .todo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .todo:last-child { border-bottom: none; }
  .todo .text { cursor: pointer; flex: 1; }
  .todo .text:hover { color: var(--spark); }
  .todo .edit { flex: 1; }
  .remove {
    padding: 2px 8px;
    font-size: 11px;
    color: var(--muted-dim);
    border: none;
    background: none;
  }
  .remove:hover { color: #ff6b6b; background: none; border: none; }
  .hint { font-size: 12px; color: var(--muted-dim); margin-top: 10px; margin-bottom: 0; }
  .empty { font-size: 13px; color: var(--muted-dim); margin-top: 12px; text-align: center; }
</style>
