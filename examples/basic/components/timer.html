<div class="card">
  <h2>Timer: {seconds}s</h2>
  <p class="hint">setInterval mutating proxy state — async updates work too.</p>
  <div class="row">
    <button :disabled="running" onclick="{start}">Start</button>
    <button :disabled="!running" onclick="{stop}">Stop</button>
    <button class="reset" onclick="{reset}">Reset</button>
  </div>
</div>

<script>
  let seconds = 0;
  let running = false;
  let handle = null;

  function start() {
    if (running) return;
    running = true;
    handle = setInterval(() => { seconds++; }, 1000);
  }
  function stop() {
    running = false;
    clearInterval(handle);
  }
  function reset() {
    stop();
    seconds = 0;
  }
</script>

<style>
  h2 { margin-bottom: 6px; font-variant-numeric: tabular-nums; }
  .reset { margin-left: auto; color: var(--muted); }
</style>
