<div class="card">
  <h2>Cart <span class="badge">reads the same store</span></h2>
  <p class="empty" :hidden="cart.items.length > 0">Cart is empty — buy something above.</p>
  <ul :hidden="cart.items.length === 0">
    <template each="item in cart.items">
      <li>{item}</li>
    </template>
  </ul>
  <p class="total" :hidden="cart.items.length === 0">
    {cart.items.length} item{cart.items.length === 1 ? '' : 's'} — total <strong>${cart.total}</strong>
  </p>
  <button :hidden="cart.items.length === 0" onclick="{clear}">Clear cart</button>
</div>

<script>
  const cart = useStore('cart');

  function clear() {
    cart.items = [];
    cart.total = 0;
  }
</script>

<style>
  h2 { margin-bottom: 14px; }
  .badge { font-size: 11px; font-weight: 400; color: #34d399; background: var(--surface-2); padding: 2px 8px; border-radius: 10px; vertical-align: middle; }
  .empty { font-size: 13px; color: var(--muted-dim); }
  ul { list-style: none; padding: 0; }
  li { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .total { margin-top: 12px; font-size: 14px; }
  .total strong { color: var(--spark); }
  button { margin-top: 12px; color: #ff6b6b; }
  button:hover { border-color: #ff6b6b; color: #ff6b6b; }
</style>
