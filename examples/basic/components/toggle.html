<div class="card">
  <h2>Toggle</h2>
  <p class="hint">Boolean state driving a dynamic :class binding.</p>

  <button class="switch" :class="on ? 'switch on' : 'switch'" onclick="{flip}">
    <span class="knob"></span>
  </button>
  <span class="state">{on ? 'ON' : 'OFF'}</span>
</div>

<script>
  let on = false;
  function flip() { on = !on; }
</script>

<style>
  .card { display: flex; flex-direction: column; gap: 6px; }
  .switch {
    width: 52px;
    height: 28px;
    border-radius: 14px;
    border: 1px solid var(--border-strong);
    background: var(--surface-2);
    position: relative;
    cursor: pointer;
    padding: 0;
    transition: background .15s;
  }
  .switch:hover { border-color: var(--border-strong); }
  .switch.on { background: var(--spark); border-color: var(--spark); }
  .knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.45);
    transition: transform .15s;
  }
  .switch.on .knob { transform: translateX(24px); background: #000; }
  .state { font-size: 13px; font-weight: 700; color: var(--spark); }
</style>
