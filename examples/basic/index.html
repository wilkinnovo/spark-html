<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spark Example</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* Design system — same dark palette as the Spark website (novo.ws style).
         Lives in <head> so the tokens + base apply globally before any component
         boots — no flash, no scoping concerns. */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #000; --surface: #0a0a0a; --surface-2: #101014;
        --border: #1a1a1a; --border-strong: #333;
        --text: #fff; --muted: #888; --muted-dim: #555; --spark: #ffd24a;
        --font: "JetBrains Mono", ui-monospace, monospace;
      }
      body {
        font-family: var(--font); background: var(--bg); color: var(--text);
        line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh;
      }
      ::selection { background: var(--spark); color: #000; }
      a { color: var(--spark); text-decoration: none; }

      /* Shared component system — components lean on these instead of each
         redefining a card/button/input. */
      .card {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 12px; padding: 22px;
      }
      .card h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; letter-spacing: -.01em; }
      .hint { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
      code { background: var(--surface-2); color: var(--spark); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

      button, .btn {
        font-family: inherit; font-size: 14px; cursor: pointer;
        padding: 8px 16px; border-radius: 8px;
        border: 1px solid var(--border-strong); background: var(--surface-2); color: var(--text);
        transition: border-color .12s, background .12s, color .12s;
      }
      button:hover { border-color: var(--spark); color: var(--spark); }
      button:disabled { opacity: .4; cursor: not-allowed; }
      button.primary { background: var(--spark); color: #000; border-color: var(--spark); font-weight: 700; }
      button.primary:hover { color: #000; filter: brightness(1.06); }

      input, textarea {
        font-family: inherit; font-size: 14px; width: 100%;
        background: #000; color: var(--text);
        border: 1px solid var(--border-strong); border-radius: 8px; padding: 9px 12px;
      }
      input:focus, textarea:focus { outline: none; border-color: var(--spark); }
    </style>
  </head>
  <body>
    <div import="components/app"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
