<!-- GET /api/suggest?q=... — live autocomplete as the user types. A bare
     package specifier resolves fine from a dynamic import() here (see
     api/search.html's note on why a RELATIVE project-file import wouldn't). -->
<script>
  if (req.method !== 'GET') return { status: 405, body: 'Method not allowed' };
  const q = String(req.query.q || '').trim();
  if (!q) return [];
  try {
    const { default: suggest } = await import('youtube-suggest');
    return await suggest(q);
  } catch {
    return [];
  }
</script>
