<!-- POST/GET /api/search — the client's own re-search (typing Enter, or the
     Search button) without a full page reload.

     NOTE (see bugs.md): this does NOT `import('../lib/search.js')` to share
     code with the page's `results = ./lib/search.js` module source, even
     though that would be the obvious thing to do. An api/*.html <script> is
     compiled with `new Function(...)`, so a dynamic import()'s relative
     specifier resolves against spark-ssr's OWN installed location, not this
     project — `../lib/search.js` silently 404s from inside node_modules
     somewhere, not this file's real sibling. A BARE package specifier
     ('yt-search') still resolves fine (Node's algorithm walks up looking for
     node_modules, and eventually reaches this project's), which is why that
     works below but a relative project-file import doesn't. -->
<script>
  function formatViews(n) {
    if (n == null) return '0';
    if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
    return String(n);
  }
  if (req.method !== 'GET' && req.method !== 'POST') return { status: 405, body: 'Method not allowed' };
  const q = String(req.query.q || (req.method === 'POST' ? (await req.body()).fields.q : '') || '').trim();
  if (!q) return [];
  try {
    const { default: yts } = await import('yt-search');
    const r = await yts(q);
    return (r.videos || []).slice(0, 24).map((v) => ({
      videoId: v.videoId,
      title: v.title,
      thumbnail: v.thumbnail,
      duration: v.timestamp,
      views: v.views,
      viewsFormatted: formatViews(v.views),
      ago: v.ago,
      author: { name: v.author?.name || 'Unknown' },
    }));
  } catch {
    return [];
  }
</script>
