<div class="card">
  <h2>import-with-state</h2>
  <p class="hint">Import + local state + click handlers + reactive <code>$:</code></p>
  <p>Count: {count} ({word})</p>
  <div class="row">
    <button onclick="{inc}">+</button>
    <button onclick="{dec}">−</button>
    <button class="reset" onclick="{reset}">Reset</button>
  </div>
</div>

<script>
  import { pluralize } from '../lib/format.js';
  let count = 0;
  $: word = pluralize(count, 'time', 'times');
  function inc() { count++; }
  function dec() { count--; }
  function reset() { count = 0; }
</script>
