<div class="card">
  <h2>import-multiple</h2>
  <p class="hint">Imports <code>add</code>, <code>multiply</code> from <code>lib/math.js</code> and <code>pluralize</code> from <code>lib/format.js</code></p>
  <p>{a} + {b} = {sum}</p>
  <p>{a} × {b} = {product}</p>
  <p>"{items}" is {items} {word}</p>
</div>

<script>
  import { add, multiply } from '../lib/math.js';
  import { pluralize } from '../lib/format.js';
  let a = 3, b = 7;
  let sum = add(a, b);
  let product = multiply(a, b);
  let items = 5;
  let word = `${items} ${pluralize(items, 'item')}`;
</script>
