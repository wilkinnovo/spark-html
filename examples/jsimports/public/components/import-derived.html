<div class="card">
  <h2>import-derived</h2>
  <p class="hint">Import + <code>$:</code> derived values</p>
  <p>{a} × {b} = <strong>{product}</strong></p>
  <p>{n}! = <strong>{fact}</strong></p>
</div>

<script>
  import { multiply, factorial } from '../lib/math.js';
  let a = 6, b = 7;
  let n = 5;
  $: product = multiply(a, b);
  $: fact = factorial(n);
</script>
