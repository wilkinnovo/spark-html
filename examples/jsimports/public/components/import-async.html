<div class="card">
  <h2>import-async</h2>
  <p class="hint">Import async function + top-level <code>await</code></p>
  <p>{data.greeting}</p>
  <p class="hint" :hidden="!data.timestamp">Fetched at {new Date(data.timestamp).toLocaleTimeString()}</p>
  <p class="hint" :hidden="loading">loaded</p>
</div>

<script>
  import { fetchGreeting } from '../lib/api.js';
  let name = 'Spark Import';
  let data = {};
  let loading = true;
  fetchGreeting(name).then(r => { data = r; loading = false; });
</script>
