<!-- Kept as a SEPARATE component (rather than inlined in _layout.html) on
     purpose: spark-ssr's auto-404 for [param] pages disables itself if the
     page's merged markup contains any "else"/"else-if" ANYWHERE (including
     the layout) — keeping the logged-in/out branch inside its own imported
     file means it never shows up in the page+layout text that check scans.
     Props are plain strings only (never a whole row): `loggedin` is an
     explicit "yes"/"no", not an empty-string-is-truthy footgun (see
     bugs.md #5 — an EMPTY-STRING prop value, not just a missing one, is
     coerced to boolean `true` by the client runtime on a non-hydrating
     page's kept import host). `q` is intentionally NOT a prop for that
     same reason — it's read from location.search client-side instead.

     The search form below does a full page reload on every submit — not
     wired to spark-ssr's ambient `navigate()` helper (see docs #ssr-navigate),
     and deliberately so, for two independent reasons: (1) this component is
     imported separately from pages/index.html, and an imported component's
     script is scope-isolated from the page that imports it — it cannot call
     `navigate`/`refresh` declared in the host page's generated script, only
     the page itself (or a layout, which DOES share page scope) can; (2) even
     if the search box lived in index.html directly, that page is deliberately
     NON-hydrating today ("a pure function of (path, query) ... a response-
     cache candidate" — see its own top comment) — wiring navigate() would
     force it to hydrate and give up that cache eligibility. A full reload on
     search is the correct tradeoff here, not an oversight. -->
<nav class="nav">
  <a class="brand" href="/"><span class="mark">📌</span> Pinspire</a>
  <form class="search" action="/" method="get">
    <input type="search" name="q" placeholder="Search pins" value="{q}">
  </form>
  <span class="spacer"></span>
  <span class="links">
    <template if="loggedin === 'yes'">
      <a class="btn primary sm" href="/create">+ Create</a>
      <a class="avatar-link" href="/u/{meusername}" title="{mename}">
        <img src="{meavatar}" alt="{mename}">
      </a>
      <form action="/api/logout" method="post" redirect="/"><button class="btn ghost sm">Log out</button></form>
    </template>
    <template if="loggedin !== 'yes'">
      <a class="btn ghost sm" href="/login">Log in</a>
      <a class="btn primary sm" href="/signup">Sign up</a>
    </template>
    <span import="/components/theme-toggle"></span>
  </span>
</nav>

<script>
  export let loggedin = 'no';
  export let mename = '';
  export let meusername = '';
  export let meavatar = '/img/avatar-default.svg';
  // Read directly from the browser rather than passed as a prop — see the
  // comment above this file for why.
  let q = typeof location !== 'undefined' ? (new URLSearchParams(location.search).get('q') || '') : '';
</script>
