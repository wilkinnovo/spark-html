id = "spark-html"
name = "Spark"
version = "0.4.0"
schema_version = 1
authors = ["Wilkin Novo"]
description = "spark-html single-file component support for Zed (https://zed.dev) — HTML + {interpolation} + scoped <script>/<style>."
repository = "https://github.com/wilkinnovo/spark-html"

# spark-html components are syntactically a near-subset of Svelte (HTML +
# {expr} + <script>/<style>), so we reuse the well-tested Svelte tree-sitter
# grammar — which gives real interpolation nodes, so {…} highlights as JS.
[grammars.svelte]
repository = "https://github.com/tree-sitter-grammars/tree-sitter-svelte"
rev = "ae5199db47757f785e43a14b332118a5474de1a2"
