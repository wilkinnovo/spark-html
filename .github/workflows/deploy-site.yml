name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'packages/spark/**'
      - 'packages/spark-prerender/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (links workspaces)
        run: bun install

      - name: Build website
        # Base path = "/<repo-name>/" so assets and runtime-fetched
        # component fragments resolve on GitHub Pages.
        run: bun run site:build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
