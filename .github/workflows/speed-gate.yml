name: speed-gate

# Nightly promise harness (improvements.md I2b/I2c): the published speed and
# convergence claims, enforced red. Nightly, not per-PR — shared-runner
# variance makes paired ratios the only trustworthy currency, and the paired
# run is too slow for every push.
#
# Thresholds (rationale in .claude/skills/spark-project/references/workflows.md
# "Nightly gates"): CPU geomean ≤ 1.65× vanilla (achieved 1.496; CI measured
# 1.515 headless / 1.507 xvfb-windowed — the paired ratio transfers).
# First-paint ≤ 2.30×: virtualized displays measure fp in a DIFFERENT REGIME
# than the ledger's real display (CI: 1.967 headless, 1.978 xvfb-windowed —
# stable across both; vanilla itself paints ~96 ms here vs 337 ms on the
# ledger box). The published 0.86× is defended by the ledger's stated method
# (windowed, real display — benchmarks.md carries the environment note);
# this gate defends against REGRESSIONS in CI's own band (~1.97 observed,
# +17% headroom). Tighten only after ≥5 consecutive green nights.

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  krausest:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies (build-dist needs esbuild)
        run: bun install

      - name: Install xvfb
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb

      # WINDOWED under xvfb, not --headless: headless Chrome skips paints,
      # which makes 43_first-paint lie (measured 1.97x headless on this
      # runner vs 0.86x windowed on the ledger box — the first dispatch run
      # proved it). Windowed-under-xvfb is the ledger's method.
      - name: Paired krausest run (count=8, windowed) + ratio gate
        env:
          JFB_DIR: ${{ runner.temp }}/jfb
          CHROME: /usr/bin/google-chrome
        run: xvfb-run -a -s "-screen 0 1280x1024x24" ./bench/krausest/run.sh --count 8 --windowed --gate 1.65 2.30

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: krausest-results
          path: ${{ runner.temp }}/jfb/webdriver-ts/results/
          retention-days: 30
          if-no-files-found: ignore

  fuzz-5000:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Same convergence oracle as the per-PR fuzz.js 500 in npm test, at
      # nightly scale. Iteration count is the script's argv knob.
      - name: Convergence fuzz — 5,000 iterations
        run: node packages/spark/test/fuzz.js 5000
