name: Publish spark-html-image to npm

on:
  push:
    tags:
      - 'image-v*' # e.g. git tag image-v0.1.0 && git push --tags
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/image-v')
        run: |
          PKG_VERSION=$(node -p "require('./packages/spark-html-image/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#image-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag image-v$TAG_VERSION does not match package version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/spark-html-image
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
