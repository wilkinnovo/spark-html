name: Publish spark-html-test-utils to npm

on:
  push:
    tags:
      - 'test-utils-v*' # e.g. git tag test-utils-v0.1.0 && git push --tags
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/test-utils-v')
        run: |
          PKG_VERSION=$(node -p "require('./packages/spark-html-test-utils/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#test-utils-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag test-utils-v$TAG_VERSION does not match package version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/spark-html-test-utils
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
