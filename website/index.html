<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spark — HTML that reacts!</title>
    <meta
      name="description"
      content="Single-file HTML components with built-in reactivity. No compiler, no virtual DOM, no build step."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"
    />
    <style>
      /* Base shell styles — everything else lives in components */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0c0c11;
        --surface: #14141c;
        --surface-2: #1b1b26;
        --border: #26263a;
        --text: #e8e6f0;
        --muted: #8b89a0;
        --accent: #8b7cff;
        --accent-dim: #2a2545;
        --spark: #ffd24a;
        --radius: 12px;
        --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
      }
      html { scroll-behavior: smooth; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background:
          radial-gradient(ellipse 70% 45% at 50% -8%, rgba(139, 124, 255, .14), transparent),
          linear-gradient(rgba(139,124,255,.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(139,124,255,.035) 1px, transparent 1px),
          var(--bg);
        background-size: 100% 100%, 44px 44px, 44px 44px, 100% 100%;
        color: var(--text);
        line-height: 1.6;
      }
      ::selection { background: var(--accent); color: #0c0c11; }
    </style>
  </head>
  <body>
    <div import="components/site-nav"></div>
    <div import="components/hero"></div>
    <div import="components/features"></div>
    <div import="components/philosophy"></div>
    <div import="components/playground"></div>
    <div import="components/store-demo"></div>
    <div import="components/composition-demo"></div>
    <div import="components/quickstart"></div>
    <div import="components/site-footer"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
