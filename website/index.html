<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spark — HTML that reacts. Built for humans.</title>
    <meta name="description" content="Single-file reactive HTML components for people who love hand-writing web apps. The .html you save is the component that runs — no compiler, no virtual DOM, no build step." />
    <meta property="og:title" content="Spark — HTML that reacts. Built for humans." />
    <meta property="og:description" content="Single-file reactive HTML components, hand-crafted by you. No compiler, no virtual DOM, no build step." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://spark-html.dev/og.png" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <!-- Fonts: spark-html-font/bun in spark.config.js injects preconnects, the
         stylesheet, and a size-adjusted local fallback face — the swap doesn't
         move or visibly reflow the page. -->
    <!-- No flash of the wrong theme: spark-html-theme/bun in spark.config.js
         injects the init script before first paint (dev and build). -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:#000; --surface:#0a0a0a; --surface-2:#101014;
        --border:#1a1a1a; --border-strong:#333;
        --text:#fff; --muted:#888; --muted-dim:#555; --muted-nav:#666;
        --accent:#fff; --accent-dim:#16161c; --spark:#ffd24a;
        /* --spark stays bright for backgrounds/highlights; --spark-ink is the
           color for spark-colored TEXT. On dark, bright yellow reads great. */
        --spark-ink:#ffd24a;
        --sk-dark:#111; --sk-mid:#1a1a1a; --sk-light:#222;
        --sidebar-w:80px; --radius:0;
        /* stack from spark-html-font (includes the size-adjusted fallback face);
           the var() fallback list covers a config without the font step. */
        --font:var(--font-jetbrains-mono, "JetBrains Mono", ui-monospace, monospace);
        --mono:var(--font-jetbrains-mono, "JetBrains Mono", ui-monospace, monospace);
      }
      [data-theme="light"] {
        --bg:#fff; --surface:#fafafa; --surface-2:#f4f4f5;
        --border:#ededed; --border-strong:#d4d4d4;
        --text:#1a1a1a; --muted:#666; --muted-dim:#999; --muted-nav:#888;
        --accent:#111; --accent-dim:#f0f0f0; --spark:#ffd24a;
        /* light theme: bright #ffd24a text is unreadable on white, so spark TEXT
           uses a darker gold (AA-contrast on light). Backgrounds keep --spark. */
        --spark-ink:#9a6a00;
        --sk-dark:#eee; --sk-mid:#e4e4e4; --sk-light:#dcdcdc;
      }
      [data-theme="light"] ::selection { background:#ffe9a8; color:#111; }
      html { scroll-behavior:smooth; }
      body {
        font-family:var(--font); background:var(--bg); color:var(--text);
        line-height:1.6; -webkit-font-smoothing:antialiased; min-height:100vh;
        overflow-x:hidden;
      }
      ::selection { background:var(--spark); color:#000; }
      a { color:inherit; text-decoration:none; }
      [hidden] { display:none !important; }
      .layout { display:flex; min-height:100vh; }
      .content { flex:1; margin-left:var(--sidebar-w); min-width:0; display:flex; flex-direction:column; }
      .routes { flex:1; padding:0 56px; }
      /* Full-width content on every route (the playground set the precedent):
         pages own their internal measure — docs/tutorial prose caps itself at
         a readable ch-width, grids stretch to use the space. */
      .wrap { width:100%; }
      @media (max-width:860px) {
        .layout { flex-direction:column; }   /* sidebar becomes a top bar */
        .content { margin-left:0; }
        .routes { padding:0 22px; }
      }
    </style>
  </head>
  <body>
    <!-- This entire site is built with Spark: a left-rail shell + one
         <template route> per page, the router, and the theme helper. -->
    <div class="layout">
      <div import="components/sidebar"></div>
      <div class="content">
        <main class="routes wrap">
          <template route="/"><div import="components/home"></div></template>
          <template route="/docs"><div import="components/docs-body"></div></template>
          <template route="/ssr"><div import="components/ssr"></div></template>
          <template route="/playground"><div import="components/playground"></div></template>
          <template route="/tutorials"><div import="components/tutorials"></div></template>
          <template route="/cookbook"><div import="components/cookbook"></div></template>
          <template route="/showcase"><div import="components/showcase"></div></template>
          <template route="/blog"><div import="components/blog"></div></template>
          <!-- One explicit static route per post → each prerenders to its own
               crawlable HTML page (a :slug route can't be enumerated at build). -->
          <template route="/blog/1-3-2-what-looks-like-a-bug"><div import="components/blog/1-3-2-what-looks-like-a-bug"></div></template>
          <template route="/blog/1-3-1-spark-ssr-live-raw-writes"><div import="components/blog/1-3-1-spark-ssr-live-raw-writes"></div></template>
          <template route="/blog/1-3-0-spark-ssr-api-only-mode"><div import="components/blog/1-3-0-spark-ssr-api-only-mode"></div></template>
          <template route="/blog/1-8-1-bind-write-back-ordering"><div import="components/blog/1-8-1-bind-write-back-ordering"></div></template>
        </main>
        <div import="components/footer"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <!-- The playground's result-iframe runner. On this page it's a no-op
         (guarded by __SPARK_PG__); the tag exists so the build emits it as
         its own hashed entry and playground.js can discover that URL. -->
    <script type="module" src="/src/playground-frame.js" data-spark-pg-frame></script>
  </body>
</html>
