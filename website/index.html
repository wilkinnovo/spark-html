<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spark — HTML that reacts.</title>
    <meta name="description" content="Single-file reactive HTML components. The .html you save is the component that runs — no compiler, no virtual DOM, no build step." />
    <meta property="og:title" content="Spark — HTML that reacts." />
    <meta property="og:description" content="Single-file reactive HTML components. No compiler, no virtual DOM, no build step." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://wilkinnovo.github.io/spark/og.png" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      /* no flash of the wrong theme */
      (function () {
        try {
          var m = localStorage.getItem('theme-mode') || 'system';
          var dark = m === 'dark' || (m === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) { document.documentElement.dataset.theme = 'dark'; }
      })();
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:#000; --surface:#0a0a0a; --surface-2:#101014;
        --border:#1a1a1a; --border-strong:#333;
        --text:#fff; --muted:#888; --muted-dim:#555; --muted-nav:#666;
        --accent:#fff; --accent-dim:#16161c; --spark:#ffd24a;
        /* dark theme: the yellow reads fine on dark, no shadow needed */
        --spark-shadow:none;
        --sk-dark:#111; --sk-mid:#1a1a1a; --sk-light:#222;
        --sidebar-w:80px; --radius:0;
        --font:"JetBrains Mono", ui-monospace, monospace;
        --mono:"JetBrains Mono", ui-monospace, monospace;
      }
      [data-theme="light"] {
        --bg:#fff; --surface:#fafafa; --surface-2:#f4f4f5;
        --border:#ededed; --border-strong:#d4d4d4;
        --text:#1a1a1a; --muted:#666; --muted-dim:#999; --muted-nav:#888;
        --accent:#111; --accent-dim:#f0f0f0; --spark:#ffd24a;
        /* light theme: #ffd24a on a light bg is low-contrast, so give the
           yellow text a thin dark outline so it stays legible. */
        --spark-shadow:0 0 1px rgba(0,0,0,.55), 0 1px 1px rgba(0,0,0,.45);
        --sk-dark:#eee; --sk-mid:#e4e4e4; --sk-light:#dcdcdc;
      }
      [data-theme="light"] ::selection { background:#ffe9a8; color:#111; }
      html { scroll-behavior:smooth; }
      body {
        font-family:var(--font); background:var(--bg); color:var(--text);
        line-height:1.6; -webkit-font-smoothing:antialiased; min-height:100vh;
        overflow-x:hidden;
      }
      ::selection { background:var(--spark); color:#000; }
      a { color:inherit; text-decoration:none; }
      [hidden] { display:none !important; }
      .layout { display:flex; min-height:100vh; }
      .content { flex:1; margin-left:var(--sidebar-w); min-width:0; }
      .routes { padding:0 56px; }
      .wrap { max-width:1040px; margin:0 auto; }
      @media (max-width:860px) {
        .layout { flex-direction:column; }   /* sidebar becomes a top bar */
        .content { margin-left:0; }
        .routes { padding:0 22px; }
      }
    </style>
  </head>
  <body>
    <!-- This entire site is built with Spark: a left-rail shell + one
         <template route> per page, the router, and the theme helper. -->
    <div class="layout">
      <div import="components/sidebar"></div>
      <div class="content">
        <main class="routes wrap">
          <template route="/"><div import="components/home"></div></template>
          <template route="/docs"><div import="components/docs-body"></div></template>
          <template route="/playground"><div import="components/playground"></div></template>
          <template route="/showcase"><div import="components/showcase"></div></template>
        </main>
        <div import="components/footer"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
