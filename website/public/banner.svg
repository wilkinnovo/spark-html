<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 330" width="880" height="330" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="Spark — HTML that reacts. Single-file reactive components: no compiler, no virtual DOM, no build step.">
  <defs>
    <radialGradient id="glow" cx="28%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#ffd24a" stop-opacity="0.20"/>
      <stop offset="45%" stop-color="#ffd24a" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffd24a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="reacts" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffd24a"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffd24a" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="880" height="330" fill="#000000"/>
  <rect width="880" height="330" fill="url(#grid)"/>
  <rect width="880" height="330" fill="url(#glow)"/>
  <rect x="0" y="328" width="880" height="2" fill="#ffd24a" opacity="0.5"/>

  <!-- ── left column ─────────────────────────────────────────────── -->
  <!-- wordmark -->
  <text x="56" y="72" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="6">
    <tspan fill="#ffd24a">⚡</tspan> SPARK
  </text>

  <!-- headline -->
  <text x="54" y="140" font-size="52" font-weight="800" letter-spacing="-2">
    <tspan fill="#ffffff">HTML that</tspan>
  </text>
  <text x="54" y="192" font-size="52" font-weight="800" letter-spacing="-2">
    <tspan fill="url(#reacts)">reacts.</tspan>
  </text>

  <!-- subline -->
  <text x="56" y="226" font-size="14" fill="#9a9a9a" letter-spacing="0.3">
    Single-file reactive components.
  </text>
  <text x="56" y="248" font-size="14" fill="#6b6b6b" letter-spacing="0.3">
    No compiler &#183; no virtual DOM &#183; no build step
  </text>

  <!-- stat chips -->
  <g font-size="12.5" font-weight="600">
    <rect x="56" y="272" width="104" height="32" rx="8" fill="#0b0b0b" stroke="#1c1c1c"/>
    <text x="108" y="293" text-anchor="middle"><tspan fill="#ffd24a">13 kB</tspan><tspan fill="#888888"> gzip</tspan></text>
    <rect x="170" y="272" width="88" height="32" rx="8" fill="#0b0b0b" stroke="#1c1c1c"/>
    <text x="214" y="293" text-anchor="middle"><tspan fill="#ffd24a">0</tspan><tspan fill="#888888"> deps</tspan></text>
    <rect x="268" y="272" width="120" height="32" rx="8" fill="#0b0b0b" stroke="#1c1c1c"/>
    <text x="328" y="293" text-anchor="middle"><tspan fill="#ffd24a">18</tspan><tspan fill="#888888"> packages</tspan></text>
    <rect x="398" y="272" width="112" height="32" rx="8" fill="#0b0b0b" stroke="#1c1c1c"/>
    <text x="454" y="293" text-anchor="middle"><tspan fill="#ffd24a">MIT</tspan><tspan fill="#888888"> license</tspan></text>
  </g>

  <!-- ── right column: the product, verbatim ─────────────────────── -->
  <g>
    <!-- editor card -->
    <rect x="556" y="52" width="276" height="252" rx="12" fill="#0b0b0b" stroke="#1f1f1f"/>
    <!-- title bar -->
    <path d="M556 64a12 12 0 0 1 12-12h252a12 12 0 0 1 12 12v22H556z" fill="#111111"/>
    <line x1="556" y1="86" x2="832" y2="86" stroke="#1f1f1f"/>
    <circle cx="576" cy="69" r="4.5" fill="#2c2c2c"/>
    <circle cx="592" cy="69" r="4.5" fill="#2c2c2c"/>
    <circle cx="608" cy="69" r="4.5" fill="#2c2c2c"/>
    <text x="694" y="73.5" text-anchor="middle" font-size="12" fill="#8a8a8a">counter.html</text>

    <!-- code -->
    <g font-size="12.5">
      <text x="576" y="116" fill="#7d7d7d">&lt;<tspan fill="#e6e6e6">h2</tspan>&gt;Count: <tspan fill="#ffd24a">{count}</tspan>&lt;/<tspan fill="#e6e6e6">h2</tspan>&gt;</text>
      <text x="576" y="140" fill="#7d7d7d">&lt;<tspan fill="#e6e6e6">button</tspan> <tspan fill="#b8b8b8">onclick</tspan>=<tspan fill="#ffd24a">{inc}</tspan>&gt;+1&lt;/<tspan fill="#e6e6e6">button</tspan>&gt;</text>

      <text x="576" y="176" fill="#7d7d7d">&lt;<tspan fill="#e6e6e6">script</tspan>&gt;</text>
      <text x="592" y="200" fill="#c9c9c9"><tspan fill="#ffb86b">let</tspan> count = <tspan fill="#ffd24a">0</tspan>;</text>
      <text x="592" y="224" fill="#c9c9c9"><tspan fill="#ffb86b">function</tspan> inc() { count++; }</text>
      <text x="576" y="248" fill="#7d7d7d">&lt;/<tspan fill="#e6e6e6">script</tspan>&gt;</text>
    </g>

    <!-- caption -->
    <text x="694" y="284" text-anchor="middle" font-size="10.5" fill="#666666">the file you save is the file that runs</text>
  </g>
</svg>
