<p class="readout">mode: <b>{theme.mode}</b> · resolved: <b>{theme.resolved}</b></p>

<div class="btns">
  <button class="add" onclick="{theme.toggle}">toggle</button>
  <button class="ghost" onclick="{setMode}" data-mode="light">light</button>
  <button class="ghost" onclick="{setMode}" data-mode="dark">dark</button>
  <button class="ghost" onclick="{setMode}" data-mode="system">system</button>
</div>
<p class="meta">the whole site restyles — theme() writes data-theme on &lt;html&gt; and persists the choice</p>

<script>
  const theme = useStore('theme');

  function setMode(event) { theme.set(event.target.dataset.mode); }
</script>

<style>
  .readout { font-size: 14px; margin-bottom: 12px; }
  .readout b { color: var(--spark-ink); }
  .btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .meta { font-size: 11.5px; color: var(--muted); }
  .add, .ghost {
    font-family: var(--mono);
    border: none; border-radius: 8px; padding: 9px 16px;
    font-weight: 700; cursor: pointer; transition: transform .08s;
  }
  .add { background: var(--spark); color: #000; }
  .ghost { background: transparent; color: var(--muted); border: 1px solid var(--border-strong); }
  .add:active, .ghost:active { transform: scale(.94); }
</style>
