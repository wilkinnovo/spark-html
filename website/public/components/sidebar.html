<aside class="sidebar">
  <span :class="'logo ' + (sparkSeq % 2 ? 'flick-a' : 'flick-b')" onclick="{theme.toggle}" title="Toggle theme"><span class="bolt">⚡</span></span>

  <!-- desktop rail -->
  <nav class="rail desktop-only">
    <ul class="nav">
      <li><a href="{app.base}/">Home</a></li>
      <li><a href="{app.base}/docs">Docs</a></li>
      <li><a href="{app.base}/playground">Playground</a></li>
      <li><a href="{app.base}/tutorials">Tutorials</a></li>
      <li><a href="{app.base}/showcase">Showcase</a></li>
    </ul>
  </nav>
  <div class="foot desktop-only">
    <a class="gh" href="https://github.com/wilkinnovo/spark-html" target="_blank" rel="noopener" aria-label="GitHub" title="GitHub">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.86 10.92c.575.106.785-.25.785-.555 0-.274-.01-1-.015-1.965-3.196.695-3.87-1.54-3.87-1.54-.523-1.33-1.276-1.684-1.276-1.684-1.043-.713.08-.699.08-.699 1.153.081 1.76 1.184 1.76 1.184 1.026 1.758 2.69 1.25 3.346.956.104-.743.402-1.25.73-1.538-2.552-.29-5.236-1.276-5.236-5.68 0-1.255.448-2.28 1.183-3.084-.118-.29-.513-1.46.113-3.043 0 0 .965-.309 3.163 1.178a11 11 0 0 1 5.76 0c2.197-1.487 3.16-1.178 3.16-1.178.628 1.583.233 2.753.115 3.043.737.804 1.182 1.829 1.182 3.084 0 4.415-2.688 5.387-5.248 5.671.413.356.78 1.057.78 2.13 0 1.538-.014 2.778-.014 3.156 0 .308.207.667.79.554A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5Z"/></svg>
    </a>
    <span class="mark">⚡</span>
    <span class="yr">© {year}</span>
  </div>

  <!-- mobile hamburger -->
  <button class="hamburger" onclick="{toggleMenu}" aria-label="Menu"><span></span><span></span><span></span></button>

  <!-- mobile drawer -->
  <div class="drawer" :hidden="!menuOpen" onclick="{closeMenu}">
    <div class="drawer-inner" onclick="{stopProp}">
      <div class="drawer-head">
        <span :class="'logo ' + (sparkSeq % 2 ? 'flick-a' : 'flick-b')" onclick="{theme.toggle}" title="Toggle theme"><span class="bolt">⚡</span></span>
        <button class="close" onclick="{closeMenu}" aria-label="Close">&times;</button>
      </div>
      <ul class="nav drawer-nav">
        <li><a href="{app.base}/">Home</a></li>
        <li><a href="{app.base}/docs">Docs</a></li>
        <li><a href="{app.base}/playground">Playground</a></li>
        <li><a href="{app.base}/tutorials">Tutorials</a></li>
        <li><a href="{app.base}/showcase">Showcase</a></li>
      </ul>
      <div class="drawer-foot">
        <a class="gh" href="https://github.com/wilkinnovo/spark-html" target="_blank" rel="noopener" aria-label="GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.86 10.92c.575.106.785-.25.785-.555 0-.274-.01-1-.015-1.965-3.196.695-3.87-1.54-3.87-1.54-.523-1.33-1.276-1.684-1.276-1.684-1.043-.713.08-.699.08-.699 1.153.081 1.76 1.184 1.76 1.184 1.026 1.758 2.69 1.25 3.346.956.104-.743.402-1.25.73-1.538-2.552-.29-5.236-1.276-5.236-5.68 0-1.255.448-2.28 1.183-3.084-.118-.29-.513-1.46.113-3.043 0 0 .965-.309 3.163 1.178a11 11 0 0 1 5.76 0c2.197-1.487 3.16-1.178 3.16-1.178.628 1.583.233 2.753.115 3.043.737.804 1.182 1.829 1.182 3.084 0 4.415-2.688 5.387-5.248 5.671.413.356.78 1.057.78 2.13 0 1.538-.014 2.778-.014 3.156 0 .308.207.667.79.554A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5Z"/></svg>
        </a>
        <span class="mark">⚡ SPARK</span>
        <span class="yr">© {year}</span>
      </div>
    </div>
  </div>
</aside>

<script>
  const app = useStore('app');
  const route = useStore('route');
  const theme = useStore('theme');
  let year = new Date().getFullYear();
  let menuOpen = false;

  // (document.title is handled by head() in main.js — spark-html-head.)
  // Close the drawer whenever navigation changes the route.
  let prevPath = route.path;
  $: if (route.path !== prevPath) { prevPath = route.path; menuOpen = false; }

  // The logo sparks like the hero reacts-text: once on load, and again on
  // every theme toggle. Alternating between two identical keyframe sets is
  // what retriggers the CSS animation.
  let sparkSeq = 0;
  let prevResolved = theme.resolved;
  $: if (theme.resolved !== prevResolved) { prevResolved = theme.resolved; sparkSeq++; }

  function toggleMenu() { menuOpen = !menuOpen; }
  function closeMenu() { menuOpen = false; }
  function stopProp(e) { e.stopPropagation(); }
</script>

<style>
  .sidebar {
    position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
    background: var(--surface); border-right: 1px solid var(--border); z-index: 100;
    display: flex; flex-direction: column; justify-content: space-between; align-items: center;
  }
  .logo {
    /* the same spark ink + glow the hero's "reacts." wears */
    --logo-glow: rgba(255, 210, 74, .8);
    --logo-ring: rgba(255, 210, 74, .28);
    /* the circle is var(--text) (inverts with the theme), so the bolt ink
       must invert too: deep gold on the white circle, bright on the dark */
    --logo-bolt: #9a6a00;
    width: 44px; height: 44px; border-radius: 50%; margin: 14px; flex-shrink: 0; cursor: pointer;
    display: grid; place-items: center; font-size: 24px; background: var(--text); color: var(--logo-bolt);
    box-shadow: 0 0 0 1px var(--logo-ring), 0 0 11px var(--logo-ring);
    transition: transform .2s, box-shadow .2s; user-select: none;
  }
  :global([data-theme="light"]) .logo {
    /* light theme: dark circle → bright bolt; page is light → darker glow */
    --logo-bolt: var(--spark);
    --logo-glow: rgba(154, 106, 0, .65);
    --logo-ring: rgba(154, 106, 0, .35);
  }
  .logo:hover { box-shadow: 0 0 0 1px var(--logo-glow), 0 0 22px var(--logo-glow); }
  .logo:active { transform: scale(.88); }
  .bolt { display: block; text-shadow: 0 0 8px var(--logo-glow); }
  /* two identical flickers — swapping the class replays it on theme toggle */
  .flick-a .bolt { animation: sparkBoltA 1.05s ease-in-out 1; }
  .flick-b .bolt { animation: sparkBoltB 1.05s ease-in-out .35s 1; }
  @keyframes sparkBoltA {
    0% { opacity: .25; text-shadow: none; } 10% { opacity: 1; } 14% { opacity: .4; }
    20% { opacity: 1; text-shadow: 0 0 26px var(--logo-glow); } 30% { opacity: .7; }
    38% { opacity: 1; text-shadow: 0 0 12px var(--logo-glow); } 100% { opacity: 1; text-shadow: 0 0 8px var(--logo-glow); }
  }
  @keyframes sparkBoltB {
    0% { opacity: .25; text-shadow: none; } 10% { opacity: 1; } 14% { opacity: .4; }
    20% { opacity: 1; text-shadow: 0 0 26px var(--logo-glow); } 30% { opacity: .7; }
    38% { opacity: 1; text-shadow: 0 0 12px var(--logo-glow); } 100% { opacity: 1; text-shadow: 0 0 8px var(--logo-glow); }
  }
  @media (prefers-reduced-motion: reduce) { .flick-a .bolt, .flick-b .bolt { animation: none; } }
  .rail { display: flex; align-items: center; }
  .nav { list-style: none; display: flex; gap: 54px; align-items: center; transform: rotate(90deg); }
  .nav li { margin: 0; }
  .nav a { color: var(--muted-nav); white-space: nowrap; }
  .nav a:hover { color: var(--text); }
  .nav a[aria-current="page"] { color: var(--text); font-weight: 700; }
  .foot { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 0; }
  .gh { color: var(--muted-nav); display: inline-flex; }
  .gh:hover { color: var(--text); }
  .mark { font-size: 15px; font-weight: 800; letter-spacing: .04em; }
  .yr { font-size: 11px; font-weight: 300; color: var(--muted-nav); }

  /* hamburger + drawer (mobile only) */
  .hamburger {
    display: none; flex-direction: column; gap: 5px; background: none; border: none;
    cursor: pointer; padding: 10px; align-items: center; justify-content: center;
  }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 1px; }
  .drawer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; }
  .drawer-inner {
    position: absolute; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; padding: 16px 24px 28px;
  }
  .drawer-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .drawer-head .logo { margin: 0; }
  .close { background: none; border: none; color: var(--text); font-size: 34px; line-height: 1; cursor: pointer; padding: 4px 8px; }
  .drawer-nav { transform: none; flex-direction: column; align-items: flex-start; gap: 22px; padding: 24px 4px; }
  .drawer-nav a { font-size: 22px; font-weight: 600; }
  .drawer-foot {
    margin-top: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    border-top: 1px solid var(--border); padding-top: 18px; text-align: right;
  }

  @media (max-width: 860px) {
    .sidebar {
      position: sticky; top: 0; width: 100%; height: auto; flex-direction: row;
      justify-content: space-between; border-right: none; border-bottom: 1px solid var(--border);
      padding: 0 12px;
    }
    .desktop-only { display: none; }
    .hamburger { display: flex; }
    .drawer { display: block; }
    .logo { width: 38px; height: 38px; font-size: 19px; margin: 9px 0; }
  }
</style>
