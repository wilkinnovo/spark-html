<label class="lbl">Component source (edit it — even one character):</label>
<textarea bind:value="source" rows="3"></textarea>

<p class="row">integrity: <b class="hash">{hash || '…'}</b></p>
<p class="row">vs. shipped manifest:
  <b :class="verdict === 'verified' ? 'ok' : 'bad'">{verdict}</b>
</p>
<p class="meta">this is the real spark-html-sri verify path — the hash of what arrived must match the hash the build recorded, or the component never boots</p>

<script>
  let source = '<h1>Hello, spark</h1>';
  let hash = '';
  let expected = '';
  let verdict = '…';

  // The exact integrity() the runtime uses (exposed via main.js).
  // Guarded: prerender runs this component without main.js.
  $: if (typeof window !== 'undefined' && window.__pgSri) window.__pgSri(source).then((h) => {
    hash = h;
    if (!expected) expected = h; // "the build" recorded the original
    verdict = h === expected ? 'verified' : 'BLOCKED — integrity mismatch';
  });
</script>

<style>
  .lbl { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  textarea {
    font-family: var(--mono); font-size: 13px; width: 100%;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border-strong); border-radius: 8px; padding: 9px 12px;
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: var(--spark); }
  .row { font-size: 12.5px; margin-top: 10px; word-break: break-all; }
  .hash { color: var(--spark-ink); font-size: 11.5px; }
  .ok { color: #38c172; }
  .bad { color: #ff6b6b; }
  .meta { font-size: 11.5px; color: var(--muted); margin-top: 10px; }
</style>
