<template if="post">
  <section class="page">
    <a class="back" :href="app.base + '/blog'">← All posts</a>

    <header class="head">
      <div class="row1">
        <span :class="'tag tag-' + post.tag.toLowerCase()">{post.tag}</span>
        <time class="date">{post.date}</time>
      </div>
      <h1 class="title">{post.title}</h1>
    </header>

    <article class="body" id="post-body" spark-ignore></article>

    <footer class="postfoot">
      <a class="back2" :href="app.base + '/blog'">← All posts</a>
    </footer>
  </section>
</template>

<template if="!post">
  <section class="page notfound">
    <h1 class="title">Post not found</h1>
    <p class="sub">That post doesn't exist (yet). <a :href="app.base + '/blog'">Back to the blog →</a></p>
  </section>
</template>

<script>
  const app = useStore('app');
  const route = useStore('route');
  const blog = useStore('blog');

  $: slug = route.params.slug;
  $: post = (blog.posts || []).find((p) => p.slug === slug) || null;
  $: pageTitle = post ? `Spark — ${post.title}` : 'Spark — Blog';
  $: pageDescription = post ? post.excerpt : 'Releases, fixes, and news from Spark.';

  // post.body is trusted HTML we author ourselves (bundled JS, not user
  // input) — injected directly since Spark has no raw-HTML directive by
  // design (interpolation always renders text, never markup).
  onMount(() => {
    if (typeof document === 'undefined' || !post) return;
    const el = document.getElementById('post-body');
    if (el) el.innerHTML = post.body;
  });
</script>

  .back { display: inline-block; margin-bottom: 28px; }
  .head { margin-bottom: 30px; }
  .row1 { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .tag {
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    padding: 3px 9px; border-radius: 999px; color: #000; background: var(--spark);
  }
  .tag-fix { background: var(--spark); }
  .tag-release { background: #7ce29b; }
  .tag-news { background: #8fc6ff; }
  .date { font-size: 12.5px; color: var(--muted-dim); }
  .title { font-size: clamp(26px, 4.4vw, 38px); font-weight: 800; letter-spacing: -.03em; line-height: 1.25; }
  .notfound .sub { color: var(--muted); margin-top: 10px; }
  .notfound .sub a { color: var(--spark-ink); }

  /* article prose — matches the docs page's typographic system */
  .body :global(h2) { font-size: 20px; margin: 40px 0 14px; padding-top: 20px; border-top: 1px solid var(--border); letter-spacing: -.01em; font-weight: 700; scroll-margin-top: 24px; }
  .body :global(h2:first-child) { border-top: none; padding-top: 0; margin-top: 0; }
  .body :global(p) { margin: 12px 0; font-size: 15px; color: var(--muted); line-height: 1.8; }
  .body :global(p strong) { color: var(--text); font-weight: 600; }
  .body :global(a) { color: var(--spark-ink); }
  .body :global(code) { font-size: 13px; background: var(--surface-2); padding: 2px 6px; color: var(--spark-ink); }
  .body :global(pre) { background: var(--surface); border: 1px solid var(--border); padding: 16px 18px; font-size: 13px; line-height: 1.7; color: var(--muted); overflow-x: auto; margin: 16px 0; white-space: pre; }
  .body :global(pre code) { background: none; padding: 0; color: inherit; }

  .postfoot { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); }

  @media (max-width: 720px) {
    .page { padding: 36px 0 60px; }

  }
</style>
