<p class="readout">route.path = <b>{route.path}</b></p>
<p class="readout">route.query = <b>{JSON.stringify(route.query || {})}</b></p>

<div class="btns">
  <button class="add" onclick="{next}">?page={Number(route.query?.page || 1) + 1}</button>
  <button class="ghost" onclick="{search}">?q=spark</button>
  <button class="ghost" onclick="{clear}">clear query</button>
</div>
<p class="meta">watch the URL bar — writes go through history.replaceState, reads are reactive</p>

<script>
  const route = useStore('route');

  function next() { route.query.page = String(Number(route.query.page || 1) + 1); }
  function search() { route.query.q = 'spark'; }
  function clear() { navigate(location.pathname); }
</script>

<style>
  .readout { font-size: 13.5px; margin-bottom: 6px; }
  .readout b { color: var(--spark-ink); word-break: break-all; }
  .btns { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0 8px; }
  .meta { font-size: 11.5px; color: var(--muted); }
  .add, .ghost {
    font-family: var(--mono);
    border: none; border-radius: 8px; padding: 9px 16px;
    font-weight: 700; cursor: pointer; transition: transform .08s;
  }
  .add { background: var(--spark); color: #000; }
  .ghost { background: transparent; color: var(--muted); border: 1px solid var(--border-strong); }
  .add:active, .ghost:active { transform: scale(.94); }
</style>
