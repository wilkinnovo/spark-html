<div import="components/ui-card">
  <span slot="title">📥 {user.name}'s inbox</span>

  <p>You have <strong class="n">{user.unread}</strong> unread message{user.unread === 1 ? '' : 's'}.</p>
  <p class="zero" :hidden="user.unread > 0">Inbox zero. Nice ✨</p>

  <button slot="actions" class="ghost" :disabled="user.unread === 0" onclick="{markRead}">Mark all read</button>
  <button slot="actions" class="solid" onclick="{receive}">Simulate new</button>
</div>

<script>
  // Plain object → deeply reactive: mutate in place, no replacing needed.
  let user = { name: 'Ada', unread: 3 };

  function markRead() { user.unread = 0; }
  function receive()  { user.unread++; }
</script>

<style>
  .n { color: var(--spark); }
  .zero { color: var(--muted); font-size: 13px; margin-top: 6px; }
  button {
    padding: 7px 14px; border-radius: 8px; font-size: 13px;
    cursor: pointer; font-family: inherit; border: 1px solid var(--border);
  }
  .ghost { background: var(--surface-2); color: var(--text); }
  .ghost:hover:not(:disabled) { border-color: var(--accent); }
  .solid { background: var(--accent); color: #0c0c11; border-color: var(--accent); font-weight: 600; }
  button:disabled { opacity: .4; cursor: not-allowed; }
</style>
