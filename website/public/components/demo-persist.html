<p class="readout">visits to this demo: <b>{opens}</b></p>
<label class="lbl">A note that survives reloads:</label>
<input bind:value="prefs.note" placeholder="type, then hit reload" />
<p class="meta">persist('pg-prefs', …) — hydrates from localStorage on boot, saves on every change. <b>Reload the page.</b></p>

<script>
  // Created once in main.js: persist('pg-prefs', { opens: 0, note: '' })
  const prefs = useStore('pg-prefs');
  let opens = 0;

  onMount(() => {
    prefs.opens++;         // saved to localStorage immediately
    opens = prefs.opens;   // local mirror for this render
  });
</script>
