<p class="readout">inspector: <b>{on ? 'running — check the ⚡ panel, bottom-right' : 'off'}</b></p>
<button class="add" onclick="{toggle}">{on ? 'stop devtools()' : 'run devtools()'}</button>
<button class="ghost" onclick="{poke}" :disabled="!on">cause a patch</button>
<p class="count" :hidden="!on">pokes: {pokes} — watch the patch counter tick and this component flash amber</p>
<p class="meta">read-only: stores, the component tree, and a live patch counter. On this site it's loaded on demand; in your app: <code>if (import.meta.env.DEV) devtools()</code></p>

<script>
  let on = false;
  let pokes = 0;
  let stop = null;

  async function toggle() {
    if (on) { stop && stop(); stop = null; on = false; return; }
    // Loaded lazily so visitors who never open this demo pay zero bytes.
    stop = await window.__pgDevtools({ open: true });
    on = true;
  }
  function poke() { pokes++; }

  onMount(() => () => { stop && stop(); });
</script>

<style>
  .readout { font-size: 14px; margin-bottom: 12px; }
  .readout b { color: var(--spark-ink); }
  .count { font-size: 12.5px; margin-top: 10px; }
  .meta { font-size: 11.5px; color: var(--muted); margin-top: 10px; }
  .add, .ghost {
    font-family: var(--mono);
    border: none; border-radius: 8px; padding: 9px 16px;
    font-weight: 700; cursor: pointer; transition: transform .08s; margin-right: 8px;
  }
  .add { background: var(--spark); color: #000; }
  .ghost { background: transparent; color: var(--muted); border: 1px solid var(--border-strong); }
  .ghost:disabled { opacity: .4; cursor: not-allowed; }
  .add:active, .ghost:active:not(:disabled) { transform: scale(.94); }
</style>
