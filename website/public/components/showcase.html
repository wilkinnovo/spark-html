<section class="page">
  <header class="head">
    <h1 class="page-title">Built with Spark</h1>
    <p class="sub">Real sites shipping single-file Spark components. <a href="https://github.com/wilkinnovo/spark" target="_blank" rel="noopener">Add yours →</a></p>
  </header>

  <div class="grid">
    <template each="s in sites">
      <a class="card" href="{s.url}" target="_blank" rel="noopener">
        <div class="thumb">
          <img src="{app.base}/showcase/{s.slug}.webp" alt="{s.name}" loading="lazy" onerror="this.style.display='none'" />
          <span class="stub">{s.name}</span>
        </div>
        <div class="meta">
          <div class="nm">{s.name} <span class="arr">↗</span></div>
          <div class="ds">{s.desc}</div>
          <div class="tags">
            <template each="t in s.tags"><span class="tag">{t}</span></template>
          </div>
        </div>
      </a>
    </template>

    <a class="card add" href="https://github.com/wilkinnovo/spark" target="_blank" rel="noopener">
      <div class="thumb"><span class="stub">+ add yours</span></div>
      <div class="meta">
        <div class="nm">Your site here</div>
        <div class="ds">Built something with Spark? Open a PR adding an entry and a screenshot.</div>
        <div class="tags"><span class="tag">PR welcome</span></div>
      </div>
    </a>
  </div>
</section>

<script>
  let pageTitle = 'Spark — Showcase';
  let pageDescription = 'Sites built with Spark — single-file reactive HTML components.';
  const app = useStore('app');
  const showcase = useStore('showcase');
  $: sites = showcase.sites || [];
</script>
